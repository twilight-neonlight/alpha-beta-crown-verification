# alpha-beta-CROWN configuration for the MNIST MLP robustness benchmark.
#
# This config drives a batch of verification instances listed in instances.csv
# (VNN-COMP style: one row per "onnx_path,vnnlib_path,timeout"). Each row pairs
# our ONNX model with one robustness property generated by src/gen_vnnlib.py.
#
# Run from the project root (see test.py), e.g.:
#   python <abCROWN>/complete_verifier/abcrown.py --config configs/mnist_mlp.yaml
#
# Result codes per instance:
#   safe    -> property holds for the whole eps-ball  (Verified / robust)
#   unsafe  -> a counterexample was found             (Falsified / not robust)
#   unknown / timeout -> verification did not finish within the time budget

general:
  # Use 'cuda' if a GPU is available; CPU is fine for this tiny MLP.
  device: cpu
  # Paths inside instances.csv are resolved relative to this directory.
  # test.py overrides this with the absolute project path at runtime.
  root_path: .
  # VNN-COMP style instances list (model, property, timeout per row).
  csv_name: instances.csv
  # Where the per-instance verdicts are written.
  results_file: results/abcrown_out.txt

model:
  # Default model; the CSV supplies the actual onnx per instance.
  onnx_path: models/model.onnx
  # MLP takes a flat 784-vector (batch dim is dynamic).
  input_shape: [-1, 784]

attack:
  # Run a quick PGD attack BEFORE bound propagation. If it finds an adversarial
  # example the instance is reported 'unsafe' immediately (cheap falsification);
  # otherwise we fall through to complete alpha,beta-CROWN verification.
  pgd_order: before

solver:
  # Plenty of headroom for a 784->32->16->10 network.
  batch_size: 2048
  # Initial incomplete bound: alpha-CROWN (optimized linear relaxation).
  bound_prop_method: alpha-crown
  alpha-crown:
    iteration: 100      # optimization steps for the alpha (slope) parameters
    lr_alpha: 0.1
  beta-crown:
    iteration: 20       # per-node beta optimization steps during branch-and-bound
    lr_beta: 0.05

bab:
  # Fallback timeout; instances.csv may specify a per-row timeout too.
  timeout: 120
  branching:
    # Filtered smart branching: a strong, general-purpose ReLU split heuristic.
    method: kfsb
    candidates: 3
